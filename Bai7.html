<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        tr ,td,th,table{
            border: 1px solid;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <h1>Báo cáo tài chính năm</h1>
    <table>
        <caption style="width: 400px;">Báo cáo doanh thu và lợi nhuận các quý trong năm</caption>
        <thead>
            <tr>
                <th>Chỉ tiêu</th>
                <th>Quí 1</th>
                <th>Quí 2</th>
                <th>Quí 3</th>
                <th>Quí 4</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th>Doanh thu(tỷ VND)</th>
                <td>500</td>
                <td>650</td>
                <td>700</td>
                <td>850</td>
            </tr>
            <tr>
                <th>Lợi Nhuận(tỷ VND)</th>
                <td>120</td>
                <td>180</td>
                <td>210</td>
                <td>250</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
