<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hồ sơ thông tin cá nhân</h1>
    <form action="#">
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            <label for="ten">Tên :</label>
            <input type="text" placeholder="Nhập họ và tên" id="ten"><br />
            <label for="ngaysinh">Ngày sinh :</label>
            <input type="date">
        </fieldset>
        <fieldset>
            <legend>Thông tin liên hệ</legend>
            <label for="email">Email :</label>
            <input type="email" id="email" placeholder="example@email.com"> <br/>
            <label for="sdt">Số điện thoại</label>
            <input type="tel" id="sdt" placeholder="0912345678"> 
        </fieldset>
        <label for="ghichu">Ghi chú bổ sung: </label> <br/>
        <textarea name="ghichu" id="ghichu" cols="60" rows="5" placeholder="Nhập ghi chú của bạn tại đây ..."></textarea>
    </form>
</body>
</html>
